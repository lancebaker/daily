<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f5f1e8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Daily Check-In v2.0</title>
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');
       
        :root {
            --cream: #f5f1e8;
            --warm-white: #fdfcfa;
            --sage: #9e7f61;
            --deep-sage: #6b5d52;
            --soft-green: #a8b5a0;
            --accent: #d4a574;
            --text-dark: #3a3330;
            --text-muted: #8a7d75;
            --border: rgba(158, 127, 97, 0.15);
        }
       
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
       
        body {
            font-family: 'Lora', serif;
            background: linear-gradient(135deg, var(--cream) 0%, var(--warm-white) 100%);
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
       
        .container {
            width: 100%;
            max-width: 600px;
        }
       
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 2px;
            box-shadow: 0 20px 60px rgba(58, 51, 48, 0.08);
            border: 1px solid var(--border);
        }
       
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
       
        .date {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-family: 'Crimson Pro', serif;
        }
       
        h1 {
            font-family: 'Crimson Pro', serif;
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--deep-sage);
            margin-bottom: 10px;
        }
       
        .subtitle {
            font-style: italic;
            color: var(--text-muted);
        }
       
        .progress-bar {
            height: 4px;
            background: var(--border);
            margin-bottom: 40px;
            border-radius: 2px;
            overflow: hidden;
        }
       
        .progress-fill {
            height: 100%;
            background: var(--sage);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
       
        .question-container {
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
       
        .question {
            text-align: center;
        }
       
        .question-number {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            font-family: 'Crimson Pro', serif;
        }
       
        .question-text {
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--deep-sage);
            margin-bottom: 40px;
            line-height: 1.4;
        }
       
        .answer-group {
            margin-top: 20px;
        }
       
        .yes-no-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }
       
        .answer-btn {
            flex: 1;
            max-width: 200px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid var(--border);
            color: var(--text-dark);
            font-family: 'Crimson Pro', serif;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }
       
        .answer-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--sage);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }
       
        .answer-btn span {
            position: relative;
            z-index: 1;
        }
       
        @media (hover: hover) and (pointer: fine) {
            .answer-btn:hover::before {
                transform: scaleX(1);
            }
           
            .answer-btn:hover {
                color: var(--warm-white);
                border-color: var(--sage);
            }
        }
       
        .answer-btn.selected {
            background: var(--sage);
            border-color: var(--sage);
            color: var(--warm-white);
            font-weight: 600;
        }
       
        .answer-btn.selected::before {
            transform: scaleX(1);
        }

        .instrument-selector {
            display: none;
            margin-top: 20px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid var(--border);
            border-radius: 2px;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .instrument-selector.visible {
            display: block;
        }

        .instrument-label {
            font-family: 'Crimson Pro', serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .instrument-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .instrument-option {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.6);
            border: 1.5px solid var(--border);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .instrument-option:hover {
            border-color: var(--sage);
            background: rgba(158, 127, 97, 0.1);
        }

        .instrument-option input[type="checkbox"] {
            margin-right: 10px;
            cursor: pointer;
        }

        .instrument-option label {
            font-family: 'Lora', serif;
            font-size: 0.95rem;
            color: var(--text-dark);
            cursor: pointer;
            user-select: none;
        }
       
        .text-input-container {
            position: relative;
        }
        
        .examples-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
            margin-bottom: 15px;
            text-align: center;
            line-height: 1.6;
        }
       
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid var(--border);
            color: var(--text-dark);
            font-family: 'Lora', serif;
            font-size: 1rem;
            resize: vertical;
            transition: all 0.3s ease;
            line-height: 1.7;
        }
       
        textarea:focus {
            outline: none;
            border-color: var(--sage);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 5px 20px rgba(158, 127, 97, 0.1);
        }
       
        textarea::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }
       
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            gap: 20px;
        }
       
        .nav-btn {
            padding: 15px 35px;
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text-dark);
            font-family: 'Crimson Pro', serif;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 600;
        }
       
        .nav-btn:hover:not(:disabled) {
            background: var(--sage);
            border-color: var(--sage);
            color: var(--warm-white);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(158, 127, 97, 0.15);
        }
       
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
       
        .nav-btn.primary {
            background: var(--sage);
            border-color: var(--sage);
            color: var(--warm-white);
        }
       
        .nav-btn.primary:hover:not(:disabled) {
            background: var(--deep-sage);
            border-color: var(--deep-sage);
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(107, 93, 82, 0.2);
        }

        .skip-btn {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: 'Lora', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-style: italic;
            text-decoration: underline;
        }

        .skip-btn:hover {
            color: var(--sage);
        }
       
        .completion-screen {
            text-align: center;
            padding: 60px 20px;
        }
       
        .completion-icon {
            font-size: 4rem;
            margin-bottom: 30px;
        }
       
        .completion-title {
            font-family: 'Crimson Pro', serif;
            font-size: 2rem;
            color: var(--deep-sage);
            margin-bottom: 15px;
            font-weight: 400;
        }
       
        .completion-message {
            color: var(--text-muted);
            font-style: italic;
            margin-bottom: 40px;
            line-height: 1.8;
        }
       
        .streak-display {
            display: inline-block;
            padding: 20px 40px;
            background: rgba(168, 181, 160, 0.15);
            border-radius: 2px;
            margin-bottom: 40px;
        }
       
        .streak-number {
            font-family: 'Crimson Pro', serif;
            font-size: 3rem;
            font-weight: 600;
            color: var(--sage);
        }
       
        .streak-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }
       
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
           
            .question-text {
                font-size: 1.4rem;
            }
           
            .card {
                padding: 30px 20px;
            }
           
            .yes-no-container {
                flex-direction: column;
                gap: 15px;
            }
           
            .answer-btn {
                max-width: 100%;
            }
           
            .navigation {
                flex-direction: column;
                gap: 15px;
            }
           
            .nav-btn {
                width: 100%;
            }

            .instrument-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div style="background: #d4a574; color: white; padding: 8px; border-radius: 4px; margin-bottom: 15px; font-weight: bold; font-size: 0.9rem;">✅ VERSION 2.1 - 13 COLUMNS</div>
                <div class="date" id="currentDate"></div>
                <h1>Daily Reflections</h1>
                <div class="subtitle">A moment of mindful presence</div>
            </div>
           
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
           
            <div id="appContent">
                <!-- Questions will be rendered here -->
            </div>
        </div>
    </div>
 
    <script>
        class DailyCheckIn {
            constructor() {
                this.webhookUrl = 'https://script.google.com/macros/s/AKfycbxCQgxHVg9skDv-MNUmDwmOqCgfUjrgRRDfCHvyMuuDZZlDDSyBiEc-1tFrlidAfMqeog/exec';
               
                this.questions = [
                    { id: 1, text: "Did you lift today?", type: "yesno" },
                    { id: 2, text: "Did you meditate today? (HeartMath or Nova)", type: "yesno" },
                    { id: 3, text: "Did you read today?", type: "yesno" },
                    { id: 4, text: "Did you do a course today?", type: "yesno" },
                    { 
                        id: 5, 
                        text: "Did you play an instrument today?", 
                        type: "yesno",
                        hasSubQuestion: true,
                        instruments: ["Guitar", "Violin", "Flute", "Handpan", "Harmonium", "Banjo"]
                    },
                    { id: 6, text: "Did you do the Gateway Tapes today?", type: "yesno" },
                    { id: 7, text: "Did you do your Art Journal?", type: "yesno" },
                    { 
                        id: 8, 
                        text: "What personal goal feels most important to you right now?",
                        examples: "e.g. new song circle songs, record original songs, new song meditations (Suno), create YouTube playlist for circle, storytelling, etc.",
                        type: "text"
                    },
                    { id: 9, text: "What are you grateful for today?", type: "text" },
                    { id: 10, text: "What feels most important to you right now?", type: "text" }
                ];
               
                this.currentQuestion = 0;
                this.answers = {};
                this.checkInDate = new Date();
                this.dateSelected = false;
                this.isSubmitting = false;
                this.init();
            }
           
            init() {
                this.updateDate();
                this.showDateSelection();
            }
            
            showDateSelection() {
                const content = document.getElementById('appContent');
                const today = new Date().toISOString().split('T')[0];
                
                content.innerHTML = `
                    <div class="question-container">
                        <div class="question">
                            <div class="question-text" style="text-align: center; margin-bottom: 30px;">
                                When would you like to check in for?
                            </div>
                            <div style="text-align: center; margin-bottom: 30px;">
                                <input type="date" 
                                       id="checkInDatePicker" 
                                       value="${today}"
                                       max="${today}"
                                       style="padding: 15px 20px; font-size: 1rem; border: 1.5px solid var(--border); background: rgba(255, 255, 255, 0.8); color: var(--text-dark); font-family: 'Lora', serif; border-radius: 2px; cursor: pointer;">
                            </div>
                            <div style="text-align: center; color: var(--text-muted); font-size: 0.9rem; font-style: italic; margin-bottom: 20px;">
                                Select today for your current check-in, or choose a past date to fill in a missed day
                            </div>
                        </div>
                    </div>
                    <div class="navigation" style="justify-content: center;">
                        <button class="nav-btn primary" onclick="app.confirmDate()">
                            Continue
                        </button>
                    </div>
                `;
            }
            
            confirmDate() {
                const dateInput = document.getElementById('checkInDatePicker');
                this.checkInDate = new Date(dateInput.value + 'T12:00:00');
                this.dateSelected = true;
                this.checkIfCompletedForDate();
            }
            
            checkIfCompletedForDate() {
                const selectedDateString = this.checkInDate.toDateString();
                const lastCompleted = localStorage.getItem('lastCompletedDate');
                
                if (lastCompleted === selectedDateString) {
                    if (confirm('You already completed a check-in for this date. Do you want to do it again?')) {
                        this.renderQuestion();
                    } else {
                        this.showDateSelection();
                    }
                } else {
                    this.renderQuestion();
                }
            }
           
            updateDate() {
                const now = new Date();
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', options);
            }
           
            renderQuestion() {
                const content = document.getElementById('appContent');
                const question = this.questions[this.currentQuestion];
                const progress = ((this.currentQuestion) / this.questions.length) * 100;
                document.getElementById('progressFill').style.width = progress + '%';
               
                if (question.type === 'yesno') {
                    const instrumentSection = question.hasSubQuestion ? `
                        <div class="instrument-selector" id="instrumentSelector">
                            <div class="instrument-label">Which instrument(s)?</div>
                            <div class="instrument-options">
                                ${question.instruments.map(inst => `
                                    <div class="instrument-option">
                                        <input type="checkbox" id="inst_${inst}" value="${inst}" onchange="app.updateInstruments()">
                                        <label for="inst_${inst}">${inst}</label>
                                    </div>
                                `).join('')}
                            </div>
                            <div style="margin-top: 20px; text-align: center;">
                                <button class="nav-btn primary" onclick="app.nextQuestion()">
                                    ${this.currentQuestion === this.questions.length - 1 ? 'Finish' : 'Continue'}
                                </button>
                            </div>
                        </div>
                    ` : '';

                    content.innerHTML = `
                        <div class="question-container">
                            <div class="question">
                                <div class="question-number">Question ${this.currentQuestion + 1} of ${this.questions.length}</div>
                                <div class="question-text">${question.text}</div>
                                <div class="answer-group">
                                    <div class="yes-no-container">
                                        <button class="answer-btn" onclick="app.selectYesNo(true)">
                                            <span>Yes</span>
                                        </button>
                                        <button class="answer-btn" onclick="app.selectYesNo(false)">
                                            <span>No</span>
                                        </button>
                                    </div>
                                    ${instrumentSection}
                                </div>
                            </div>
                        </div>
                        ${this.currentQuestion > 0 ? `
                        <div class="navigation">
                            <button class="nav-btn" onclick="app.previousQuestion()">
                                Back
                            </button>
                        </div>
                        ` : ''}
                    `;
                } else {
                    const placeholders = {
                        8: "Share what's on your mind...",
                        9: "Take a moment to reflect...",
                        10: "What's calling for your attention?"
                    };
                    const placeholder = placeholders[question.id] || "Your thoughts...";
                    
                    const examplesHtml = question.examples ? `
                        <div class="examples-text">${question.examples}</div>
                    ` : '';
                    
                    content.innerHTML = `
                        <div class="question-container">
                            <div class="question">
                                <div class="question-number">Question ${this.currentQuestion + 1} of ${this.questions.length}</div>
                                <div class="question-text">${question.text}</div>
                                ${examplesHtml}
                                <div class="answer-group">
                                    <div class="text-input-container">
                                        <textarea id="textInput-${question.id}" placeholder="${placeholder}" style="min-height: 150px;"></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="navigation">
                            <button class="nav-btn" onclick="app.previousQuestion()">
                                Back
                            </button>
                            <button class="skip-btn" onclick="app.skipQuestion()">Skip question</button>
                            <button class="nav-btn primary" onclick="app.${this.currentQuestion === this.questions.length - 1 ? 'finishCheckIn' : 'nextQuestion'}()">
                                ${this.currentQuestion === this.questions.length - 1 ? 'Complete' : 'Continue'}
                            </button>
                        </div>
                    `;
                }
               
                if (this.answers[question.id]) {
                    const answer = this.answers[question.id];
                    if (question.type === 'yesno' && answer.yesno !== undefined) {
                        const buttons = document.querySelectorAll('.answer-btn');
                        if (answer.yesno) {
                            buttons[0].classList.add('selected');
                            if (question.hasSubQuestion) {
                                document.getElementById('instrumentSelector').classList.add('visible');
                            }
                        } else {
                            buttons[1].classList.add('selected');
                        }
                    }
                    if (answer.instruments && question.hasSubQuestion) {
                        answer.instruments.forEach(inst => {
                            const checkbox = document.getElementById(`inst_${inst}`);
                            if (checkbox) checkbox.checked = true;
                        });
                    }
                    if (answer.text) {
                        const textInput = document.getElementById(`textInput-${question.id}`);
                        if (textInput) textInput.value = answer.text;
                    }
                }
            }
           
            selectYesNo(value) {
                const buttons = document.querySelectorAll('.answer-btn');
                buttons.forEach(btn => btn.classList.remove('selected'));
                
                const question = this.questions[this.currentQuestion];
                
                // INSTRUMENT DEBUG
                if (question.id === 5) {
                    console.log('=== INSTRUMENT QUESTION ===');
                    console.log('Clicked:', value ? 'YES' : 'NO');
                }
                
                if (!this.answers[question.id]) {
                    this.answers[question.id] = {};
                }
                this.answers[question.id].yesno = value;
                
                // INSTRUMENT DEBUG
                if (question.id === 5) {
                    console.log('Saved to answers:', this.answers[question.id]);
                }
               
                if (value) {
                    buttons[0].classList.add('selected');
                    const instrumentSelector = document.getElementById('instrumentSelector');
                    if (instrumentSelector) {
                        instrumentSelector.classList.add('visible');
                        return;
                    }
                } else {
                    buttons[1].classList.add('selected');
                    const instrumentSelector = document.getElementById('instrumentSelector');
                    if (instrumentSelector) {
                        instrumentSelector.classList.remove('visible');
                    }
                    if (question.hasSubQuestion) {
                        this.answers[question.id].instruments = [];
                    }
                }

                if (!question.hasSubQuestion || !value) {
                    setTimeout(() => {
                        this.nextQuestion();
                    }, 300);
                }
            }

            updateInstruments() {
                const question = this.questions[this.currentQuestion];
                if (!question.hasSubQuestion) return;

                const selected = [];
                question.instruments.forEach(inst => {
                    const checkbox = document.getElementById(`inst_${inst}`);
                    if (checkbox && checkbox.checked) {
                        selected.push(inst);
                    }
                });

                // Don't overwrite existing answer object - just add instruments to it
                if (!this.answers[question.id]) {
                    this.answers[question.id] = { yesno: true }; // Default to true since we're selecting instruments
                }
                this.answers[question.id].instruments = selected;
                
                console.log('Instrument answer saved:', this.answers[question.id]);
                
                if (selected.length > 0) {
                    setTimeout(() => {
                        this.nextQuestion();
                    }, 400);
                }
            }
           
            saveCurrentAnswer() {
                const question = this.questions[this.currentQuestion];
               
                if (question.type === 'text') {
                    const textInput = document.getElementById(`textInput-${question.id}`);
                    if (textInput && textInput.value.trim()) {
                        this.answers[question.id] = {
                            text: textInput.value.trim()
                        };
                    }
                }
            }
           
            skipQuestion() {
                this.saveCurrentAnswer();
                if (this.currentQuestion < this.questions.length - 1) {
                    this.currentQuestion++;
                    this.renderQuestion();
                } else {
                    this.finishCheckIn();
                }
            }
           
            nextQuestion() {
                this.saveCurrentAnswer();
               
                if (this.currentQuestion < this.questions.length - 1) {
                    this.currentQuestion++;
                    this.renderQuestion();
                } else {
                    this.finishCheckIn();
                }
            }
           
            previousQuestion() {
                this.saveCurrentAnswer();
               
                if (this.currentQuestion > 0) {
                    this.currentQuestion--;
                    this.renderQuestion();
                }
            }
           
            async finishCheckIn() {
                if (this.isSubmitting) {
                    console.log('Already submitting');
                    return;
                }
                
                this.isSubmitting = true;
                this.saveCurrentAnswer();
               
                document.getElementById('progressFill').style.width = '100%';
               
                await this.sendToGoogleSheets();
               
                const selectedDateString = this.checkInDate.toDateString();
                localStorage.setItem('lastCompletedDate', selectedDateString);
               
                this.updateStreak();
                this.showCompletionScreen(false);
                this.isSubmitting = false;
            }
           
            async sendToGoogleSheets() {
                try {
                    const formattedData = {
                        timestamp: new Date().toISOString(),
                        date: this.checkInDate.toLocaleDateString('en-US'),
                        liftToday: this.getAnswer(1, 'yesno'),
                        meditation: this.getAnswer(2, 'yesno'),
                        readToday: this.getAnswer(3, 'yesno'),
                        course: this.getAnswer(4, 'yesno'),
                        instrument: this.getAnswer(5, 'yesno'),
                        instrumentsPlayed: this.getAnswer(5, 'instruments'),
                        gatewayTapes: this.getAnswer(6, 'yesno'),
                        artJournal: this.getAnswer(7, 'yesno'),
                        personalGoal: this.getAnswer(8, 'text'),
                        gratitude: this.getAnswer(9, 'text'),
                        mostImportant: this.getAnswer(10, 'text')
                    };
                    
                    console.log('Sending data:', formattedData);
                   
                    const response = await fetch(this.webhookUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(formattedData)
                    });
                   
                } catch (error) {
                    console.error('Error sending to Google Sheets:', error);
                }
            }
           
            getAnswer(questionId, field) {
                const answer = this.answers[questionId];
                
                if (questionId === 5 && field === 'yesno') {
                    console.log(`Getting instrument yesno - answer object:`, answer);
                }
                
                if (!answer) return '';
               
                if (field === 'yesno') {
                    const result = answer.yesno === true ? 'Yes' : answer.yesno === false ? 'No' : '';
                    if (questionId === 5) {
                        console.log(`Instrument yesno result: "${result}"`);
                    }
                    return result;
                }

                if (field === 'instruments') {
                    return answer.instruments ? answer.instruments.join(', ') : '';
                }
               
                return answer[field] || '';
            }
           
            updateStreak() {
                let currentStreak = parseInt(localStorage.getItem('currentStreak') || '0');
                const lastDate = localStorage.getItem('lastStreakDate');
                const today = this.checkInDate.toDateString();
               
                if (lastDate !== today) {
                    currentStreak++;
                    localStorage.setItem('currentStreak', currentStreak);
                    localStorage.setItem('lastStreakDate', today);
                }
            }
           
            showCompletionScreen(isReturnVisit) {
                const streak = localStorage.getItem('currentStreak') || '1';
                const message = isReturnVisit 
                    ? "You've already completed your check-in for today. See you tomorrow!"
                    : "Your reflection has been recorded. May your practice continue to flourish.";
               
                document.getElementById('appContent').innerHTML = `
                    <div class="completion-screen">
                        <div class="completion-icon">🌿</div>
                        <div class="completion-title">Check-In Complete</div>
                        <div class="completion-message">${message}</div>
                        <div class="streak-display">
                            <div class="streak-number">${streak}</div>
                            <div class="streak-label">Day Streak</div>
                        </div>
                        <button class="nav-btn primary" onclick="window.location.href='dashboard.html'">
                            View Dashboard
                        </button>
                    </div>
                `;
            }
        }
       
        const app = new DailyCheckIn();
    </script>
</body>
</html>
